name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 8 * * 5"

permissions:
  contents: write

jobs:
  Warp_Chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4.7.1
        with:
          python-version: '3.10'

      - name: Prepare build directory
        run: mkdir -p build/release

      - name: Run Build Script
        run: |
          python3 -m pip install requests
          python3 run.py

      # 使用 7zzs 进行极限压缩
      # -mx=9 表示最高压缩等级
      - name: Compress Release Package (7z)
        run: |
          chmod +x ./7zzs
          ./7zzs a -mx=9 "build/release/${{ env.BUILD_NAME }}.7z" ./Chrome

      - name: Upload Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          path: build/release/${{ env.BUILD_NAME }}.7z
          retention-days: 15

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          tag_name: ${{ env.BUILD_NAME }}
          name: Chrome Portable ${{ env.BUILD_NAME }}
          body: |
            自动构建的 Chrome 便携版 (7z 高压缩格式)。
            版本号: ${{ env.BUILD_NAME }}
          draft: false
          prerelease: false
          files: build/release/${{ env.BUILD_NAME }}.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}