name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "0 8 * * 5"

permissions:
  contents: write

jobs:
  Warp_Chrome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4.7.1
        with:
          python-version: '3.10'

      - name: Prepare build directory
        run: mkdir -p build/release

      - name: Run Build Script
        run: |
          python3 -m pip install requests
          python3 run.py

# 修改压缩步骤：进入目录并执行压缩，避免路径层级问题
      - name: Compress Release Package (7z)
        run: |
          chmod +x ./7zzs
          # 直接在 build/release 目录下操作，确保能找到 Chrome 文件夹
          cd build/release
          ../../7zzs a -mx=9 "${{ env.BUILD_NAME }}.7z" ./Chrome

      - name: Upload Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BUILD_NAME }}
          # 修正路径
          path: build/release/${{ env.BUILD_NAME }}.7z
          retention-days: 15

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.event_name != 'pull_request'
        with:
          tag_name: ${{ env.BUILD_NAME }}
          name: Chrome Portable ${{ env.BUILD_NAME }}
          body: |
            自动构建的 Chrome 便携版 (7z 高压缩格式)。
            版本号: ${{ env.BUILD_NAME }}
          draft: false
          prerelease: false
          files: build/release/${{ env.BUILD_NAME }}.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}